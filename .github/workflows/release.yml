name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  version:
    name: Validate release version
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate vX.Y.Z tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z." >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build all platforms
    needs: version
    uses: ./.github/workflows/platform-builds.yml
    with:
      version: ${{ needs.version.outputs.version }}

  release:
    name: Create GitHub release
    needs: [version, build]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: BetterMail-*-${{ needs.version.outputs.version }}
          path: release-assets
      - name: Publish all platform artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "BetterMail $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
