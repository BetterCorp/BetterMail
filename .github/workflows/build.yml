name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Resolve build version
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Derive master build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          base=${latest#v}
          base=${base:-0.1.0}
          version="${base}-build.${GITHUB_RUN_NUMBER}.$(date -u +%Y%m%d%H%M%S)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building BetterMail $version"

  platforms:
    name: Build all platforms
    needs: version
    uses: ./.github/workflows/platform-builds.yml
    with:
      version: ${{ needs.version.outputs.version }}
