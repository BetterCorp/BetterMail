name: Bug report
description: Report a reproducible BetterMail defect.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve BetterMail. Remove personal mail, tenant, and account data from screenshots and logs.
  - type: input
    id: version
    attributes:
      label: BetterMail version
      description: Find this in Settings → About.
      placeholder: 1.2.3
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options: [Windows 11, Windows 10, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste the copied error and relevant logs. Redact addresses, message content, tenant IDs, tokens, and secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed personal data, access tokens, and secrets.
          required: true
